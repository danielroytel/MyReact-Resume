version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd astro-site
      - npm ci
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - aws s3 sync dist/ s3://danielroytel.com/ --delete
      # If CloudFront is in front of the bucket, uncomment and set
      # CLOUDFRONT_DISTRIBUTION_ID in the CodeBuild environment.
      # - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
artifacts:
  base-directory: astro-site/dist
  files:
    - '**/*'
  discard-paths: yes
