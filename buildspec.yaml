# AWS CodeBuild spec — builds the Astro site and deploys to S3.
#
# Required CodeBuild environment:
#   - Managed runtime: nodejs:20
#   - Service role with s3:PutObject / s3:DeleteObject / s3:ListBucket
#     on arn:aws:s3:::danielroytel.com/*
#   - (Optional) CLOUDFRONT_DISTRIBUTION_ID env var if a CloudFront
#     distribution sits in front of the bucket — invalidates the
#     cache after sync so the new build is visible immediately.
#
# The bucket itself (static website hosting, index-document, public-read)
# is configured out-of-band and reused from the Gatsby era.
version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: '20'
    commands:
      - cd astro-site
      - npm ci --no-audit --no-fund
  build:
    commands:
      - npm run build
  post_build:
    commands:
      # 1. Hashed build assets — immutable, 1-year cache. Filenames include
      #    a content hash so the URL changes when the content does; safe to
      #    cache aggressively. --delete removes stale hash-named files.
      - |
        aws s3 sync dist/_astro/ s3://danielroytel.com/_astro/ \
          --delete \
          --cache-control "public, max-age=31536000, immutable"
      # 2. Everything else (HTML, fonts, images, PDFs, favicon, sitemap) —
      #    5-minute cache so updates land fast without re-deploying assets.
      #    No --delete here because that would clobber the _astro/ files
      #    synced above (AWS sync --delete operates on files visible to
      #    the source filter, and _astro is excluded below).
      - |
        aws s3 sync dist/ s3://danielroytel.com/ \
          --exclude "_astro/*" \
          --cache-control "public, max-age=300"
      # 3. CloudFront invalidation (only if a distribution ID is configured).
      #    Set CLOUDFRONT_DISTRIBUTION_ID in the CodeBuild project env.
      - |
        if [ -n "${CLOUDFRONT_DISTRIBUTION_ID:-}" ]; then
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
        else
          echo "CLOUDFRONT_DISTRIBUTION_ID not set — skipping invalidation."
        fi
artifacts:
  base-directory: astro-site/dist
  files:
    - '**/*'
  discard-paths: yes
